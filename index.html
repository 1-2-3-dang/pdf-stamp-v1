<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF批量盖章工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #007AFF 0%, #0056b3 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
        }
        
        .left-panel {
            flex: 1;
            min-width: 300px;
            padding: 30px;
            border-right: 1px solid #eee;
        }
        
        .right-panel {
            flex: 1;
            min-width: 400px;
            padding: 30px;
            background: #f8f9fa;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007AFF;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #52c234;
        }
        
        .btn-success:hover {
            background: #3d8b2e;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .file-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .file-item {
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .preview-container {
            position: relative;
            width: 100%;
            height: 500px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            background: white;
            overflow: hidden;
            margin-top: 10px;
        }
        
        #pdf-preview {
            width: 100%;
            height: 100%;
        }
        
        #watermark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #watermark-image {
            position: absolute;
            cursor: move;
            pointer-events: auto;
            max-width: 150px;
            max-height: 150px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .control-slider {
            width: 100%;
        }
        
        .control-value {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .position-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .pos-btn {
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .pos-btn:hover {
            background: #007AFF;
            color: white;
        }
        
        .progress-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #52c234);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .result-section {
            margin-top: 20px;
            padding: 20px;
            background: #d4edda;
            border-radius: 12px;
            display: none;
        }
        
        .result-section h3 {
            color: #155724;
            margin-bottom: 10px;
        }
        
        .download-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #52c234;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .watermark-preview {
            margin-top: 10px;
            max-width: 100px;
            max-height: 100px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: none;
        }

        /* 隐藏文件input */
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📑 PDF批量盖章工具</h1>
            <p>纯网页版，不需要安装任何软件，用浏览器就能用！</p>
        </div>
        
        <div class="content">
            <div class="left-panel">
                <div class="section">
                    <div class="section-title">📂 选择PDF文件</div>
                    <input type="file" id="pdf-input" accept=".pdf" multiple>
                    <button class="btn" onclick="document.getElementById('pdf-input').click()">选择PDF文件（可多选）</button>
                    <div class="file-list" id="pdf-list"></div>
                </div>
                
                <div class="section">
                    <div class="section-title">🖼️ 选择水印图片</div>
                    <input type="file" id="watermark-input" accept="image/*">
                    <button class="btn" onclick="document.getElementById('watermark-input').click()">选择水印图片</button>
                    <img id="watermark-preview" class="watermark-preview">
                </div>
                
                <div class="section">
                    <div class="section-title">⚙️ 水印设置</div>
                    
                    <div class="control-group">
                        <label class="control-label">
                            透明度: <span id="opacity-value" class="control-value">0.3</span>
                        </label>
                        <input type="range" id="opacity-slider" class="control-slider" min="0.1" max="1" step="0.1" value="0.3">
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">
                            大小: <span id="size-value" class="control-value">100</span>px
                        </label>
                        <input type="range" id="size-slider" class="control-slider" min="30" max="300" step="10" value="100">
                    </div>

                    <div class="control-group">
                        <label class="control-label">
                            旋转角度: <span id="rotation-value" class="control-value">0°</span>
                        </label>
                        <input type="range" id="rotation-slider" class="control-slider" min="0" max="360" step="1" value="0">
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">快速位置</label>
                        <div class="position-buttons">
                            <button class="pos-btn" onclick="setPosition('top-left')">左上角</button>
                            <button class="pos-btn" onclick="setPosition('top-right')">右上角</button>
                            <button class="pos-btn" onclick="setPosition('center')">居中</button>
                            <button class="pos-btn" onclick="setPosition('bottom-left')">左下角</button>
                            <button class="pos-btn" onclick="setPosition('bottom-right')">右下角</button>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <button class="btn btn-success" id="start-btn" onclick="startStamping()" disabled>🚀 开始批量盖章</button>
                </div>
                
                <div class="progress-section" id="progress-section">
                    <div class="section-title">⏳ 处理进度</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill">0%</div>
                    </div>
                </div>
                
                <div class="result-section" id="result-section">
                    <h3>✅ 处理完成！</h3>
                    <p id="result-text"></p>
                    <div id="download-buttons"></div>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="section">
                    <div class="section-title">👁️ 预览（拖动水印调整位置）</div>
                    <div class="preview-container">
                        <canvas id="pdf-preview"></canvas>
                        <div id="watermark-overlay">
                            <img id="watermark-image" draggable="false">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 设置PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let selectedPdfs = [];
        let watermarkImage = null;
        let watermarkX = 300;
        let watermarkY = 400;
        let watermarkOpacity = 0.3;
        let watermarkSize = 100;
        let watermarkRotation = 0;
        let isDragging = false;
        let currentPdfDoc = null;
        
        // PDF文件选择
        document.getElementById('pdf-input').addEventListener('change', function(e) {
            selectedPdfs = Array.from(e.target.files);
            updatePdfList();
            if (selectedPdfs.length > 0) {
                loadPdfPreview(selectedPdfs[0]);
            }
            checkReady();
        });
        
        // 水印图片选择
        document.getElementById('watermark-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    watermarkImage = new Image();
                    watermarkImage.onload = function() {
                        document.getElementById('watermark-image').src = event.target.result;
                        document.getElementById('watermark-preview').src = event.target.result;
                        document.getElementById('watermark-preview').style.display = 'block';
                        updateWatermarkPosition();
                        checkReady();
                    };
                    watermarkImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 更新PDF列表
        function updatePdfList() {
            const list = document.getElementById('pdf-list');
            list.innerHTML = '';
            selectedPdfs.forEach((pdf, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.textContent = `${index + 1}. ${pdf.name}`;
                list.appendChild(item);
            });
        }
        
        // 加载PDF预览
        async function loadPdfPreview(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            currentPdfDoc = pdf;
            const page = await pdf.getPage(1);
            const scale = 0.8;
            const viewport = page.getViewport({ scale: scale });
            
            const canvas = document.getElementById('pdf-preview');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;
        }
        
        // 水印拖动
        const watermarkImg = document.getElementById('watermark-image');
        
        watermarkImg.addEventListener('mousedown', function(e) {
            isDragging = true;
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            const container = document.querySelector('.preview-container');
            const rect = container.getBoundingClientRect();
            
            watermarkX = e.clientX - rect.left;
            watermarkY = e.clientY - rect.top;
            
            updateWatermarkPosition();
        });
        
        document.addEventListener('mouseup', function() {
            isDragging = false;
        });
        
        // 透明度滑块
        document.getElementById('opacity-slider').addEventListener('input', function(e) {
            watermarkOpacity = parseFloat(e.target.value);
            document.getElementById('opacity-value').textContent = watermarkOpacity.toFixed(1);
            updateWatermarkPosition();
        });
        
        // 大小滑块
        document.getElementById('size-slider').addEventListener('input', function(e) {
            watermarkSize = parseInt(e.target.value);
            document.getElementById('size-value').textContent = watermarkSize;
            updateWatermarkPosition();
        });

        // 旋转滑块
        document.getElementById('rotation-slider').addEventListener('input', function(e) {
            watermarkRotation = parseInt(e.target.value);
            document.getElementById('rotation-value').textContent = watermarkRotation + '°';
            updateWatermarkPosition();
        });
        
        // 更新水印位置
        function updateWatermarkPosition() {
            const img = document.getElementById('watermark-image');
            img.style.left = (watermarkX - watermarkSize / 2) + 'px';
            img.style.top = (watermarkY - watermarkSize / 2) + 'px';
            img.style.width = watermarkSize + 'px';
            img.style.height = 'auto';
            img.style.opacity = watermarkOpacity;
            img.style.transform = `rotate(${watermarkRotation}deg)`;
        }
        
        // 设置快速位置
        window.setPosition = function(pos) {
            const canvas = document.getElementById('pdf-preview');
            const width = canvas.width;
            const height = canvas.height;
            
            switch(pos) {
                case 'top-left':
                    watermarkX = 60;
                    watermarkY = 60;
                    break;
                case 'top-right':
                    watermarkX = width - 60;
                    watermarkY = 60;
                    break;
                case 'center':
                    watermarkX = width / 2;
                    watermarkY = height / 2;
                    break;
                case 'bottom-left':
                    watermarkX = 60;
                    watermarkY = height - 60;
                    break;
                case 'bottom-right':
                    watermarkX = width - 60;
                    watermarkY = height - 60;
                    break;
            }
            
            updateWatermarkPosition();
        };
        
        // 检查是否准备就绪
        function checkReady() {
            const btn = document.getElementById('start-btn');
            btn.disabled = !(selectedPdfs.length > 0 && watermarkImage);
        }
        
        // 开始盖章
        window.startStamping = async function() {
            if (selectedPdfs.length === 0 || !watermarkImage) return;
            
            const progressSection = document.getElementById('progress-section');
            const resultSection = document.getElementById('result-section');
            const progressFill = document.getElementById('progress-fill');
            const startBtn = document.getElementById('start-btn');
            
            progressSection.style.display = 'block';
            resultSection.style.display = 'none';
            startBtn.disabled = true;
            
            const downloadButtons = document.getElementById('download-buttons');
            downloadButtons.innerHTML = '';
            
            for (let i = 0; i < selectedPdfs.length; i++) {
                const pdf = selectedPdfs[i];
                const progress = Math.round(((i + 1) / selectedPdfs.length) * 100);
                progressFill.style.width = progress + '%';
                progressFill.textContent = progress + '%';
                
                // 处理PDF
                const stampedPdf = await stampPdf(pdf);
                
                // 创建下载按钮
                const btn = document.createElement('button');
                btn.className = 'download-btn';
                btn.textContent = `📥 下载 ${pdf.name.replace('.pdf', '')}_已盖章.pdf`;
                btn.onclick = function() {
                    const link = document.createElement('a');
                    link.href = stampedPdf;
                    link.download = pdf.name.replace('.pdf', '_已盖章.pdf');
                    link.click();
                };
                downloadButtons.appendChild(btn);
                
                // 等待一下让UI更新
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            progressSection.style.display = 'none';
            resultSection.style.display = 'block';
            document.getElementById('result-text').textContent = `成功处理 ${selectedPdfs.length} 个文件！`;
            startBtn.disabled = false;
        };
        
        // 给单个PDF盖章（修复版：确保所有页面盖章，且内容不混乱）
        async function stampPdf(file) {
            // 重新从原始文件读取，避免任何缓存问题
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();
            
            // 将水印图片转换为PNG
            const watermarkDataUrl = await imageToPng(watermarkImage);
            const watermarkBytes = await (await fetch(watermarkDataUrl)).arrayBuffer();
            const watermarkEmbed = await pdfDoc.embedPng(watermarkBytes);
            
            // 获取第一页尺寸作为参考（所有页尺寸通常相同）
            const firstPage = pages[0];
            const { width: pdfWidth, height: pdfHeight } = firstPage.getSize();
            
            // 计算预览画布到PDF实际尺寸的缩放比例
            const canvas = document.getElementById('pdf-preview');
            const scaleX = pdfWidth / canvas.width;
            const scaleY = pdfHeight / canvas.height;
            
            // 水印在PDF中的尺寸（保持宽高比）
            const w = watermarkSize * scaleX;
            const h = watermarkSize * scaleY * (watermarkImage.height / watermarkImage.width);
            
            // 中心点映射到PDF坐标（注意Y轴翻转）
            const centerX = watermarkX * scaleX;
            const centerY = pdfHeight - watermarkY * scaleY;
            
            // 旋转角度（弧度）
            const rad = watermarkRotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);
            
            // 对每一页应用相同的水印
            pages.forEach(page => {
                // 使用变换矩阵实现以中心点为原点的旋转
                page.pushOperators(
                    PDFLib.pushGraphicsState,
                    PDFLib.concatTransformationMatrix(1, 0, 0, 1, centerX, centerY),
                    PDFLib.concatTransformationMatrix(cos, sin, -sin, cos, 0, 0),
                    PDFLib.concatTransformationMatrix(1, 0, 0, 1, -w/2, -h/2)
                );
                
                page.drawImage(watermarkEmbed, {
                    x: 0,
                    y: 0,
                    width: w,
                    height: h,
                    opacity: watermarkOpacity
                });
                
                page.pushOperators(PDFLib.popGraphicsState);
            });
            
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            return URL.createObjectURL(blob);
        }
        
        // 将图片转换为PNG
        function imageToPng(img) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/png'));
            });
        }
    </script>
</body>
</html>

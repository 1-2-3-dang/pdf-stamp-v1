<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF批量盖章工具 · 稳定版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .left-panel {
            flex: 1;
            min-width: 280px;
        }
        .right-panel {
            flex: 1.2;
            min-width: 380px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px;
        }
        .section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
        }
        .section-title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 14px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        .btn-outline {
            background: white;
            color: #3b82f6;
            border: 1.5px solid #3b82f6;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #94a3b8;
        }
        .file-list {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            max-height: 130px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }
        .file-item {
            padding: 6px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-item:last-child { border-bottom: none; }
        .preview-box {
            background: white;
            border-radius: 12px;
            padding: 10px;
            border: 1px dashed #cbd5e1;
            position: relative;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        #pdf-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: block;
        }
        #watermark-layer {
            position: relative;
            display: inline-block;
            user-select: none;
        }
        #watermark-img {
            position: absolute;
            cursor: grab;
            opacity: 0.5;
            transform-origin: center center;
            object-fit: contain;
            z-index: 10;
        }
        #watermark-img:active { cursor: grabbing; }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
        }
        .slider-container label {
            min-width: 60px;
            color: #475569;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 10px;
            background: #e2e8f0;
            outline: none;
        }
        /* 快速位置按钮样式 */
        .position-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .pos-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pos-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }
        .pos-btn:active {
            transform: scale(0.96);
        }
        .progress-area {
            margin: 18px 0;
            display: none;
        }
        .progress-bar {
            height: 22px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3b82f6;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            transition: width 0.2s ease;
        }
        .download-section {
            margin-top: 18px;
            display: none;
        }
        .download-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .download-btn:hover { opacity: 0.9; }
        .watermark-preview-thumb {
            max-width: 60px;
            max-height: 60px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-top: 8px;
            display: none;
            object-fit: contain;
        }
        .hidden-input { display: none; }
        .note {
            font-size: 12px;
            color: #059669;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>📑 PDF批量盖章 · 稳定版</h1>
    <div class="subtitle">预览与PDF输出完全一致 · 快速定位水印位置</div>

    <div class="content">
        <div class="left-panel">
            <div class="section">
                <div class="section-title">📂 1. 选择PDF（可多选）</div>
                <input type="file" id="pdf-input" class="hidden-input" accept=".pdf,application/pdf" multiple>
                <button class="btn btn-outline" id="select-pdf-btn">➕ 选择 PDF 文件</button>
                <div class="file-list" id="pdf-list">
                    <div style="color:#94a3b8; text-align:center; padding:8px;">暂无文件</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">🖼️ 2. 上传水印图片</div>
                <input type="file" id="stamp-input" class="hidden-input" accept="image/png,image/jpeg,image/webp">
                <button class="btn btn-outline" id="select-stamp-btn">🖼️ 选择水印图片</button>
                <img id="stamp-thumb" class="watermark-preview-thumb" alt="水印预览">
            </div>

            <div class="section">
                <div class="section-title">⚙️ 水印设置</div>
                <div class="slider-container">
                    <label>🔆 透明度</label>
                    <input type="range" id="opacity-slider" min="0.1" max="1.0" step="0.05" value="0.5">
                    <span id="opacity-val">50%</span>
                </div>
                <div class="slider-container">
                    <label>📏 大小</label>
                    <input type="range" id="size-slider" min="30" max="300" step="5" value="100">
                    <span id="size-val">100px</span>
                </div>
                <div class="slider-container">
                    <label>🔄 旋转</label>
                    <input type="range" id="rotation-slider" min="0" max="360" step="1" value="0">
                    <span id="rotation-val">0°</span>
                </div>
                
                <!-- 快速位置按钮 -->
                <div class="section-title" style="margin-top:10px; margin-bottom:8px;">📍 快速位置</div>
                <div class="position-btns">
                    <button class="pos-btn" id="pos-tl">左上角</button>
                    <button class="pos-btn" id="pos-tr">右上角</button>
                    <button class="pos-btn" id="pos-center">居中</button>
                    <button class="pos-btn" id="pos-bl">左下角</button>
                    <button class="pos-btn" id="pos-br">右下角</button>
                </div>
            </div>

            <button class="btn" id="start-btn" disabled>🚀 开始批量盖章</button>

            <div class="progress-area" id="progress-area">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill">0%</div>
                </div>
            </div>

            <div class="download-section" id="download-section"></div>
        </div>

        <div class="right-panel">
            <div class="section-title">👁️ 实时预览（拖动调整位置）</div>
            <div class="preview-box">
                <div id="watermark-layer">
                    <canvas id="pdf-canvas"></canvas>
                    <img id="watermark-img" src="" alt="水印" draggable="false">
                </div>
            </div>
            <div class="note">💡 预览位置=最终PDF位置，所有页面水印完全统一</div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // 配置PDF.js工作线程
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // DOM元素
        const dom = {
            pdfInput: document.getElementById('pdf-input'),
            stampInput: document.getElementById('stamp-input'),
            selectPdfBtn: document.getElementById('select-pdf-btn'),
            selectStampBtn: document.getElementById('select-stamp-btn'),
            pdfList: document.getElementById('pdf-list'),
            canvas: document.getElementById('pdf-canvas'),
            watermarkImg: document.getElementById('watermark-img'),
            stampThumb: document.getElementById('stamp-thumb'),
            opacitySlider: document.getElementById('opacity-slider'),
            opacityVal: document.getElementById('opacity-val'),
            sizeSlider: document.getElementById('size-slider'),
            sizeVal: document.getElementById('size-val'),
            rotationSlider: document.getElementById('rotation-slider'),
            rotationVal: document.getElementById('rotation-val'),
            startBtn: document.getElementById('start-btn'),
            progressArea: document.getElementById('progress-area'),
            progressFill: document.getElementById('progress-fill'),
            downloadSection: document.getElementById('download-section'),
            watermarkLayer: document.getElementById('watermark-layer'),
            // 快速位置按钮
            posTl: document.getElementById('pos-tl'),
            posTr: document.getElementById('pos-tr'),
            posCenter: document.getElementById('pos-center'),
            posBl: document.getElementById('pos-bl'),
            posBr: document.getElementById('pos-br')
        };

        // 全局状态
        const state = {
            pdfFiles: [],
            stampImage: null,
            stampDataUrl: null,
            stampRatio: 1, // 水印宽高比
            pdfViewport: { width: 0, height: 0 }, // 预览画布尺寸
            watermark: {
                x: 0, y: 0, opacity: 0.5, size: 100, rotation: 0
            },
            isDragging: false,
            dragOffset: { x: 0, y: 0 }
        };

        // 边界限制（水印不超出页面，留10px边距）
        function clampWatermarkPosition() {
            const { width, height } = state.pdfViewport;
            const halfSize = state.watermark.size / 2;
            const margin = 10; // 边距
            
            state.watermark.x = Math.max(halfSize + margin, Math.min(width - halfSize - margin, state.watermark.x));
            state.watermark.y = Math.max(halfSize + margin, Math.min(height - halfSize - margin, state.watermark.y));
        }

        // 更新水印样式（核心：预览渲染）
        function updateWatermarkPreview() {
            if (!state.stampDataUrl || !state.pdfViewport.width) return;
            
            clampWatermarkPosition();
            const wm = state.watermark;
            
            dom.watermarkImg.src = state.stampDataUrl;
            dom.watermarkImg.style.width = `${wm.size}px`;
            dom.watermarkImg.style.height = 'auto';
            dom.watermarkImg.style.opacity = wm.opacity;
            dom.watermarkImg.style.transform = `rotate(${wm.rotation}deg)`;
            dom.watermarkImg.style.left = `${wm.x - wm.size/2}px`;
            dom.watermarkImg.style.top = `${wm.y - wm.size/2}px`;
        }

        // 快速定位水印位置
        function setWatermarkPosition(position) {
            if (!state.pdfViewport.width || !state.stampDataUrl) {
                alert('请先上传PDF和水印图片！');
                return;
            }
            
            const { width, height } = state.pdfViewport;
            const halfSize = state.watermark.size / 2;
            const margin = 10; // 边距
            
            switch(position) {
                case 'tl': // 左上角
                    state.watermark.x = halfSize + margin;
                    state.watermark.y = halfSize + margin;
                    break;
                case 'tr': // 右上角
                    state.watermark.x = width - halfSize - margin;
                    state.watermark.y = halfSize + margin;
                    break;
                case 'center': // 居中
                    state.watermark.x = width / 2;
                    state.watermark.y = height / 2;
                    break;
                case 'bl': // 左下角
                    state.watermark.x = halfSize + margin;
                    state.watermark.y = height - halfSize - margin;
                    break;
                case 'br': // 右下角
                    state.watermark.x = width - halfSize - margin;
                    state.watermark.y = height - halfSize - margin;
                    break;
            }
            
            updateWatermarkPreview();
        }

        // 更新PDF文件列表
        function updatePdfFileList() {
            if (state.pdfFiles.length === 0) {
                dom.pdfList.innerHTML = '<div style="color:#94a3b8; text-align:center;">暂无文件</div>';
                return;
            }
            let html = '';
            state.pdfFiles.forEach((file, index) => {
                html += `<div class="file-item"><span>📄</span>${index+1}. ${file.name}</div>`;
            });
            dom.pdfList.innerHTML = html;
        }

        // 加载PDF预览（第一页）
        async function loadPdfPreview(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const scale = 1.0;
                const viewport = page.getViewport({ scale });

                // 设置画布尺寸
                dom.canvas.width = viewport.width;
                dom.canvas.height = viewport.height;
                state.pdfViewport = { width: viewport.width, height: viewport.height };

                // 渲染PDF
                const ctx = dom.canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                // 默认水印居中
                if (state.stampDataUrl) {
                    setWatermarkPosition('center');
                }
            } catch (err) {
                alert('PDF预览加载失败：' + err.message);
            }
        }

        // 检查是否可以开始处理
        function checkProcessReady() {
            dom.startBtn.disabled = !(state.pdfFiles.length > 0 && state.stampDataUrl);
        }

        // 绑定事件
        function bindEvents() {
            // 选择PDF
            dom.selectPdfBtn.addEventListener('click', () => dom.pdfInput.click());
            dom.pdfInput.addEventListener('change', async (e) => {
                state.pdfFiles = Array.from(e.target.files);
                updatePdfFileList();
                if (state.pdfFiles.length) await loadPdfPreview(state.pdfFiles[0]);
                checkProcessReady();
            });

            // 选择水印
            dom.selectStampBtn.addEventListener('click', () => dom.stampInput.click());
            dom.stampInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.stampDataUrl = ev.target.result;
                    dom.stampThumb.src = state.stampDataUrl;
                    dom.stampThumb.style.display = 'block';

                    // 加载图片获取宽高比
                    const img = new Image();
                    img.onload = () => {
                        state.stampImage = img;
                        state.stampRatio = img.height / img.width;
                        state.watermark.size = parseInt(dom.sizeSlider.value);
                        
                        if (state.pdfViewport.width) {
                            setWatermarkPosition('center');
                        }
                        updateWatermarkPreview();
                        checkProcessReady();
                    };
                    img.src = state.stampDataUrl;
                };
                reader.readAsDataURL(file);
            });

            // 水印拖动
            dom.watermarkImg.addEventListener('mousedown', (e) => {
                if (!state.stampImage) return;
                state.isDragging = true;
                const rect = dom.watermarkImg.getBoundingClientRect();
                state.dragOffset.x = e.clientX - rect.left;
                state.dragOffset.y = e.clientY - rect.top;
                dom.watermarkImg.style.cursor = 'grabbing';
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                const layerRect = dom.watermarkLayer.getBoundingClientRect();
                
                // 精准计算坐标（修复比例问题）
                const scaleX = state.pdfViewport.width / layerRect.width;
                const scaleY = state.pdfViewport.height / layerRect.height;
                
                const rawX = (e.clientX - layerRect.left - state.dragOffset.x) * scaleX;
                const rawY = (e.clientY - layerRect.top - state.dragOffset.y) * scaleY;
                
                state.watermark.x = rawX + state.watermark.size/2;
                state.watermark.y = rawY + state.watermark.size/2;
                
                updateWatermarkPreview();
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
                dom.watermarkImg.style.cursor = 'grab';
            });

            // 滑块控制
            dom.opacitySlider.addEventListener('input', () => {
                state.watermark.opacity = parseFloat(dom.opacitySlider.value);
                dom.opacityVal.textContent = Math.round(state.watermark.opacity * 100) + '%';
                updateWatermarkPreview();
            });

            dom.sizeSlider.addEventListener('input', () => {
                state.watermark.size = parseInt(dom.sizeSlider.value);
                dom.sizeVal.textContent = state.watermark.size + 'px';
                updateWatermarkPreview();
            });

            dom.rotationSlider.addEventListener('input', () => {
                state.watermark.rotation = parseInt(dom.rotationSlider.value);
                dom.rotationVal.textContent = state.watermark.rotation + '°';
                updateWatermarkPreview();
            });

            // 快速位置按钮事件
            dom.posTl.addEventListener('click', () => setWatermarkPosition('tl'));
            dom.posTr.addEventListener('click', () => setWatermarkPosition('tr'));
            dom.posCenter.addEventListener('click', () => setWatermarkPosition('center'));
            dom.posBl.addEventListener('click', () => setWatermarkPosition('bl'));
            dom.posBr.addEventListener('click', () => setWatermarkPosition('br'));

            // 开始处理
            dom.startBtn.addEventListener('click', startBatchProcess);
        }

        // 批量处理PDF
        async function startBatchProcess() {
            if (!state.pdfFiles.length || !state.stampDataUrl) return;

            dom.startBtn.disabled = true;
            dom.progressArea.style.display = 'block';
            dom.downloadSection.style.display = 'none';
            dom.downloadSection.innerHTML = '';

            const total = state.pdfFiles.length;
            let processed = 0;

            for (const file of state.pdfFiles) {
                try {
                    const downloadUrl = await processSinglePdf(file);
                    createDownloadButton(file.name, downloadUrl);
                } catch (err) {
                    console.error('处理失败：', err);
                    alert(`文件 ${file.name} 处理失败：${err.message}`);
                }
                
                // 更新进度
                processed++;
                const percent = Math.round((processed / total) * 100);
                dom.progressFill.style.width = `${percent}%`;
                dom.progressFill.textContent = `${percent}%`;
            }

            dom.progressArea.style.display = 'none';
            dom.downloadSection.style.display = 'block';
            dom.startBtn.disabled = false;
        }

        // 核心：处理单个PDF（修复NaN报错 + 精准坐标）
        async function processSinglePdf(file) {
            // 参数校验
            if (!state.stampDataUrl) throw new Error('未上传水印图片');
            if (!state.pdfViewport.width) throw new Error('PDF预览未加载');
            
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();
            
            // 嵌入水印图片（修复类型错误）
            let stampEmbed;
            try {
                const stampBytes = await fetch(state.stampDataUrl).then(res => res.arrayBuffer());
                if (state.stampDataUrl.includes('image/png')) {
                    stampEmbed = await pdfDoc.embedPng(stampBytes);
                } else if (state.stampDataUrl.includes('image/jpeg') || state.stampDataUrl.includes('image/jpg')) {
                    stampEmbed = await pdfDoc.embedJpg(stampBytes);
                } else {
                    throw new Error('仅支持PNG/JPG格式水印');
                }
            } catch (err) {
                throw new Error('水印图片嵌入失败：' + err.message);
            }

            // 获取PDF页面真实尺寸
            const pdfPage = pages[0];
            const { width: pdfWidth, height: pdfHeight } = pdfPage.getSize();
            
            // 精准缩放比例（预览 → PDF）
            const scale = pdfWidth / state.pdfViewport.width;
            const wm = state.watermark;

            // 水印真实尺寸（保持宽高比，避免NaN）
            const stampWidth = Number.isFinite(wm.size) ? wm.size * scale : 100 * scale;
            const stampHeight = Number.isFinite(state.stampRatio) ? stampWidth * state.stampRatio : stampWidth;

            // 坐标映射（修复Y轴翻转 + 避免NaN）
            const previewX = Number.isFinite(wm.x) ? wm.x : pdfWidth / 2;
            const previewY = Number.isFinite(wm.y) ? wm.y : pdfHeight / 2;
            
            const pdfX = (previewX - wm.size/2) * scale;
            const pdfY = pdfHeight - (previewY + wm.size/2) * scale;

            // 旋转角度校验（避免NaN）
            const rotation = Number.isFinite(wm.rotation) ? wm.rotation : 0;

            // 为所有页面添加水印（修复operator错误）
            pages.forEach(page => {
                page.drawImage(stampEmbed, {
                    x: pdfX,
                    y: pdfY,
                    width: stampWidth,
                    height: stampHeight,
                    opacity: Number.isFinite(wm.opacity) ? wm.opacity : 0.5,
                    rotate: PDFLib.degrees(rotation) // 正确的旋转参数
                });
            });

            // 生成PDF
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            return URL.createObjectURL(blob);
        }

        // 创建下载按钮
        function createDownloadButton(originalName, url) {
            const btn = document.createElement('button');
            btn.className = 'download-btn';
            const newName = originalName.replace('.pdf', '_已盖章.pdf');
            btn.textContent = `⬇️ 下载 ${newName}`;
            
            btn.addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = newName;
                a.click();
            });
            
            dom.downloadSection.appendChild(btn);
        }

        // 初始化
        bindEvents();
    })();
</script>
</body>
</html>
